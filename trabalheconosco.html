<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee House</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<header>
    <h1>Coffee House</h1>
    <p><b>Cafeteria e Gastrobar</b></p>
</header>

<body>
    <!-- NAVEGAÇÃO -->
    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre nós</a>
        <a href="menu.html">Menu</a>
        <a href="saibamais.html">Saiba mais</a>
        <a href="index.html#galeria">Galeria</a>
        <a href="trabalheconosco.html">Trabalhe conosco</a>
    </nav>
    <br>

    <!-- CONTEÚDO PRINCIPAL -->
    <main>
        <form action="obrigado.html" method="get">
            <fieldset>
                <legend>Dados pessoais</legend>
                <div class="campo">
                    <label for="nome">Nome completo *</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required minlength="3">
                </div>
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="voce@email.com" required minlength="3">
                </div>
                 <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 1234-5678" required
                        minlength="3">
                </div>
            </fieldset>

            <fieldset>
                <legend>Mensagem</legend>
                <div class="campo">
                    <label for="mensagem">Fale sobre você</label>
                    <textarea id="mensagem" name="mensagem" placeholder="Carta de apresentação..." required
                        minlength="3"></textarea>
                </div>
            </fieldset>

            <div class="campo">
                <label for="cargo">Cargo pretendido</label>
                <select id="cargo" name="cargo" required>
                    <option value="">Selecione um cargo</option>
                    <option value="atendente">Atendente</option>
                    <option value="cozinheiro">Cozinheiro</option>
                    <option value="barista">Barista</option>
                    <option value="garcom">Garçom/Garçonete</option>
                    <option value="gerente">Gerente</option>
                    <option value="parceria">Parceria</option>
                    <option value="outro">Outro</option>
                </select>

                <textarea id="qualificacoes" name="qualificacoes" placeholder="Descreva suas qualificações..." rows="5" required
                    minlength="20"></textarea>
            
                <div class="campo">
                    <label for="curriculo">Anexar currículo</label>
                    <input type="file" id="curriculo" name="curriculo" accept=".pdf,.doc,.docx" required>
                </div>

            <div class="campo">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Aceito os
                    <a href="termos.html">termos de uso</a>
                </label>
            </div>

            <div class="botoes">
                <button type="reset">Limpar</button>
                <button type="submit">Enviar</button>
            </div>
        </form>
    </main>
    <br>

    <!-- RODAPÉ -->
    <footer>
        <p>&copy; 2026 COFFEE HOUSE - Cafeteria e Gastrobar</p>
    </footer>

</body>

</html>
